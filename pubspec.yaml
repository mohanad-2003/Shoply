name: ui_kit
description: "A premium Clean Architecture + Bloc e-commerce app (Phase 1)."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Routing
  go_router: ^17.3.0

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.1
  pretty_dio_logger: ^1.4.0

  # Codegen annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Dependency injection
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.3.1

  # Connectivity
  internet_connection_checker_plus: ^3.1.1

  # UI / responsiveness
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  lottie: ^3.2.1
  flutter_svg: ^2.0.14
  shimmer: ^3.0.0
  responsive_framework: ^1.5.1
  intl: ^0.20.2

  # Functional error handling
  fpdart: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.9.0
  injectable_generator: ^3.0.2
  retrofit_generator: ^10.2.7
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

